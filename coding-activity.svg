<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-label="Illustration of students coding on laptops">
  <rect width="720" height="360" fill="#eff6ff"/>
  <!-- desk -->
  <rect x="60" y="240" width="600" height="16" rx="4" fill="#bfdbfe"/>
  <!-- laptop 1 -->
  <rect x="100" y="170" width="140" height="90" rx="6" fill="#2563eb"/>
  <rect x="108" y="178" width="124" height="70" rx="3" fill="#1e3a8a"/>
  <text x="170" y="220" font-family="monospace" font-size="14" fill="#93c5fd" text-anchor="middle">&lt;/&gt;</text>
  <!-- laptop 2 -->
  <rect x="290" y="155" width="140" height="90" rx="6" fill="#2563eb"/>
  <rect x="298" y="163" width="124" height="70" rx="3" fill="#1e3a8a"/>
  <text x="360" y="205" font-family="monospace" font-size="14" fill="#93c5fd" text-anchor="middle">{ }</text>
  <!-- laptop 3 -->
  <rect x="480" y="170" width="140" height="90" rx="6" fill="#2563eb"/>
  <rect x="488" y="178" width="124" height="70" rx="3" fill="#1e3a8a"/>
  <text x="550" y="220" font-family="monospace" font-size="14" fill="#93c5fd" text-anchor="middle">AI</text>
  <!-- people silhouettes -->
  <circle cx="170" cy="148" r="22" fill="#93c5fd"/>
  <circle cx="360" cy="133" r="22" fill="#93c5fd"/>
  <circle cx="550" cy="148" r="22" fill="#93c5fd"/>
  <!-- caption -->
  <text x="360" y="320" font-family="sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Coding Society Workshop</text>
</svg>
